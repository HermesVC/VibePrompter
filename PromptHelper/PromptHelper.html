<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PromptHelper — Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app/tokens.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { background: #07080b; }
    /* Canvas page background — soft starfield for the dark theme */
    .canvas-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(60% 45% at 50% 30%, rgba(167,139,250,0.06), transparent 70%),
        radial-gradient(40% 40% at 80% 80%, rgba(107,138,253,0.05), transparent 70%),
        #07080b;
    }
    [data-theme="light"] .canvas-bg, body.light .canvas-bg {
      background:
        radial-gradient(60% 45% at 50% 30%, rgba(107,84,214,0.05), transparent 70%),
        #ececf0;
    }
  </style>
</head>
<body>
  <div class="canvas-bg"></div>
  <div id="root" style="position: relative; z-index: 1;"></div>

  <script type="text/babel" src="app/Primitives.jsx"></script>
  <script type="text/babel" src="app/CommandPalette.jsx"></script>
  <script type="text/babel" src="app/Surfaces.jsx"></script>
  <script type="text/babel" src="app/Settings.jsx"></script>
  <script type="text/babel" src="app/design-canvas.jsx"></script>
  <script type="text/babel" src="app/tweaks-panel.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accent": "violet",
      "paletteState": "idle"
    }/*EDITMODE-END*/;

    function PromptHelperCanvas() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Apply accent via data-accent on the body wrapper of each artboard.
      // Each artboard wraps in <div data-theme={t.theme} data-accent={t.accent}>.
      const wrap = (node) => (
        <div data-theme={t.theme} data-accent={t.accent} style={{ height: '100%', background: t.theme === 'dark' ? '#0a0b0f' : '#f6f6f8' }}>
          {node}
        </div>
      );

      return (
        <>
          <DesignCanvas
            title="PromptHelper"
            subtitle="AI command palette for your operating system — full app design"
          >
            {/* HERO row — the Command Palette */}
            <DCSection id="palette" title="Command Palette" subtitle="The hero surface. Summoned with Ctrl + Shift + Space anywhere on the OS.">
              <DCArtboard id="palette-idle" label="Idle — quick actions" width={760} height={620}>
                {wrap(<div style={{ height: '100%', padding: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', background: t.theme === 'dark' ? 'radial-gradient(60% 50% at 50% 30%, rgba(167,139,250,0.06), transparent), #0a0b0f' : 'radial-gradient(60% 50% at 50% 30%, rgba(107,84,214,0.04), transparent), #f6f6f8' }}>
                  <CommandPalette theme={t.theme} state="idle" />
                </div>)}
              </DCArtboard>
              <DCArtboard id="palette-typing" label="Typing — filtered actions" width={760} height={620}>
                {wrap(<div style={{ height: '100%', padding: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', background: t.theme === 'dark' ? '#0a0b0f' : '#f6f6f8' }}>
                  <CommandPalette theme={t.theme} state="typing" />
                </div>)}
              </DCArtboard>
              <DCArtboard id="palette-streaming" label="Streaming response" width={760} height={620}>
                {wrap(<div style={{ height: '100%', padding: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', background: t.theme === 'dark' ? '#0a0b0f' : '#f6f6f8' }}>
                  <CommandPalette theme={t.theme} state="loading" />
                </div>)}
              </DCArtboard>
              <DCArtboard id="palette-result" label="Result — accept / retry" width={760} height={620}>
                {wrap(<div style={{ height: '100%', padding: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', background: t.theme === 'dark' ? '#0a0b0f' : '#f6f6f8' }}>
                  <CommandPalette theme={t.theme} state="result" />
                </div>)}
              </DCArtboard>
            </DCSection>

            {/* Onboarding */}
            <DCSection id="onboarding" title="Onboarding" subtitle="First-time setup. Provider → key → preferences in three steps.">
              <DCArtboard id="setup" label="First-time setup" width={720} height={820}>
                {wrap(<SetupScreen theme={t.theme} />)}
              </DCArtboard>
            </DCSection>

            {/* Settings */}
            <DCSection id="settings" title="Settings" subtitle="Sidebar nav + content panel. Eight sections, each a real screen.">
              <DCArtboard id="settings-general" label="General" width={920} height={680}>
                {wrap(<SettingsWindow theme={t.theme} initialTab="general" />)}
              </DCArtboard>
              <DCArtboard id="settings-shortcuts" label="Shortcuts" width={920} height={680}>
                {wrap(<SettingsWindow theme={t.theme} initialTab="shortcuts" />)}
              </DCArtboard>
              <DCArtboard id="settings-modes" label="Prompt Modes" width={1040} height={760}>
                {wrap(<SettingsWindow theme={t.theme} initialTab="modes" />)}
              </DCArtboard>
              <DCArtboard id="settings-providers" label="Providers" width={1040} height={820}>
                {wrap(<SettingsWindow theme={t.theme} initialTab="providers" />)}
              </DCArtboard>
              <DCArtboard id="settings-history" label="History" width={1040} height={760}>
                {wrap(<SettingsWindow theme={t.theme} initialTab="history" />)}
              </DCArtboard>
              <DCArtboard id="settings-appearance" label="Appearance" width={920} height={680}>
                {wrap(<SettingsWindow theme={t.theme} initialTab="appearance" />)}
              </DCArtboard>
              <DCArtboard id="settings-advanced" label="Advanced" width={920} height={620}>
                {wrap(<SettingsWindow theme={t.theme} initialTab="advanced" />)}
              </DCArtboard>
              <DCArtboard id="settings-about" label="About" width={920} height={560}>
                {wrap(<SettingsWindow theme={t.theme} initialTab="about" />)}
              </DCArtboard>
            </DCSection>

            {/* Ambient surfaces */}
            <DCSection id="ambient" title="Ambient Surfaces" subtitle="Tray, overlay, and toasts — what the user sees while working.">
              <DCArtboard id="tray" label="System tray menu" width={320} height={520}>
                {wrap(<TrayMenu theme={t.theme} />)}
              </DCArtboard>
              <DCArtboard id="overlay" label="Overlay mini — inline edit" width={420} height={360}>
                {wrap(<OverlayMini theme={t.theme} />)}
              </DCArtboard>
              <DCArtboard id="toasts" label="Toast notifications" width={380} height={300}>
                {wrap(<ToastStack theme={t.theme} />)}
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Theme">
              <TweakRadio
                label="Mode"
                value={t.theme}
                options={[{ value: 'dark', label: 'Dark' }, { value: 'light', label: 'Light' }]}
                onChange={(v) => setTweak('theme', v)}
              />
              <TweakRadio
                label="Accent"
                value={t.accent}
                options={[{ value: 'violet', label: 'Violet' }, { value: 'blue', label: 'Blue' }]}
                onChange={(v) => setTweak('accent', v)}
              />
            </TweakSection>
            <TweakSection title="Command Palette">
              <TweakSelect
                label="Hero state preview"
                value={t.paletteState}
                options={[
                  { value: 'idle', label: 'Idle — quick actions' },
                  { value: 'typing', label: 'Typing — filtered' },
                  { value: 'loading', label: 'Streaming' },
                  { value: 'result', label: 'Result' },
                ]}
                onChange={(v) => setTweak('paletteState', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PromptHelperCanvas />);
  </script>
</body>
</html>
